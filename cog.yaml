# Configuration for the serverless cloud environment
build:
  gpu: true
  python_version: "3.11"
  python_packages:
    - "torch==2.2.0"
    - "transformers==4.38.1"
    - "opencv-python==4.9.0.80"
    - "numpy==1.26.4"
    - "pillow==10.2.0"
    - "accelerate==0.27.2"
  system_packages:
    - "ffmpeg"
    - "libgl1-mesa-glx"
    - "libglib2.0-0"

predict: "predict.py:Predictor"
